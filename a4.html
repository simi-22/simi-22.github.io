<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0; 
            padding: 0;
        }
        li{
            list-style: none;
        }
        a{
            text-decoration: none;
            color: inherit;
        }
        section{
            position: relative;
            margin: 20px auto;
            max-width: 1200px;
            border: 1px solid black;
        }
        #menu{
            display: flex;
            justify-content: space-around;
            width: 100%;
            height: 40px;
            line-height: 40px;
            font-size: 20px;
            border-bottom: 1px solid black;
        }
        #menu li:hover{
            color:indianred;
        }
        main{
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 600px;
        }
        main p{
            width: 100%;
            background-color: lightpink;
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid black;
        }
        main fieldset{
            display: flex;
            margin: 20px;
            margin-top: 100px;
            padding: 20px;
            width: 300px;
            height: 200px;
        }
        
        #footer{
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-weight: bold;
            border-top: 1px solid black;
        }
    </style>
</head>
<body>
    
    <h1 align="center"><a href="index.html"><img src="img/img/logo.png" alt="닭갈비축제로고"></a></h1>
    <section>
        <header>
            <ul id="menu">
                <li><a href="a1.html">춘천소개</a></li>
                <li><a href="a2.html">사진모음</a></li>
                <li><a href="a3.html">오시는길</a></li>
                <li><a href="a4.html">회원가입</a></li>
            </ul>
        </header>
        <main>
            <p>회원가입</p>
            <div>
                <fieldset>
                    <legend>회원가입</legend>
                    <table>
                        <tr>
                            <td><label for="id">아이디</label></td>
                            <td><input type="text" id="id"></td>
                            <td><input type="button" value="중복확인"></td>
                        </tr>
                        <tr>
                            <td><label for="pw">비밀번호</label></td>
                            <td><input type="password" id="pw"></td>
                        </tr>
                        <tr>
                            <td><label for="pwcheck">비밀번호확인</label></td>
                            <td><input type="password" id="pwcheck"></td>
                        </tr>
                        <tr>
                            <td><label for="email">이메일</label></td>
                            <td><input type="email" id="email"></td>
                        </tr>
                        <tr>
                            <td colspan="2" align="right">
                                <input type="submit" value="가입">
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </div>
        </main>
        <div id="footer">춘천직업전문학교 UI/UX 웹퍼블리싱 양성과정 TEL:033-999-4444</div>
    </section>
    
</body>
</html>
